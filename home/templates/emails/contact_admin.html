<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f9f9f9;
        }
        .header {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 20px;
            border-radius: 5px 5px 0 0;
            text-align: center;
        }
        .content {
            background-color: white;
            padding: 20px;
            border: 1px solid #e5e7eb;
        }
        .field {
            margin-bottom: 15px;
            border-bottom: 1px solid #f3f4f6;
            padding-bottom: 10px;
        }
        .field-label {
            font-weight: bold;
            color: #4f46e5;
            margin-bottom: 5px;
        }
        .message-box {
            background-color: #f3f4f6;
            padding: 15px;
            border-left: 4px solid #4f46e5;
            margin-top: 10px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .footer {
            background-color: #f9f9f9;
            padding: 15px;
            text-align: center;
            font-size: 12px;
            color: #666;
            border: 1px solid #e5e7eb;
            border-top: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>New Contact Form Submission</h2>
        </div>
        <div class="content">
            <div class="field">
                <div class="field-label">Name:</div>
                <div>{{ full_name }}</div>
            </div>

            <div class="field">
                <div class="field-label">Email:</div>
                <div><a href="mailto:{{ email }}">{{ email }}</a></div>
            </div>

            {% if company %}
            <div class="field">
                <div class="field-label">Company:</div>
                <div>{{ company }}</div>
            </div>
            {% endif %}

            {% if phone %}
            <div class="field">
                <div class="field-label">Phone:</div>
                <div>{{ phone }}</div>
            </div>
            {% endif %}

            <div class="field">
                <div class="field-label">Subject:</div>
                <div>{{ subject }}</div>
            </div>

            <div class="field">
                <div class="field-label">Message:</div>
                <div class="message-box">{{ message }}</div>
            </div>
        </div>
        <div class="footer">
            <p>You can reply to this submission by contacting: {{ email }}</p>
        </div>
    </div>
</body>
</html>
