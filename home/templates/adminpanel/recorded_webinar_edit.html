{% extends "adminpanel/base.html" %}
{% load static %}

{% block content %}

<link rel="stylesheet" href="{% static 'home/css/webinar_create.css' %}">

<div class="admin-container">

<div class="top-bar">
  <div class="breadcrumb">
    <a href="#">Dashboard</a> / <span>Edit Recorded Webinar</span>
  </div>
</div>

<div class="form-container">

<form method="post">
{% csrf_token %}

<div class="section-title">
  <h2>Edit Recorded Webinar</h2>
</div>

<div class="form-grid">

<div class="input-group full-width">
<label>Title</label>
<input name="title" value="{{ webinar.title }}" required>
</div>

<div class="input-group">
<label>Category</label>
<select name="category">
{% for c in categories %}
<option value="{{ c.id }}" {% if c.id == webinar.category.id %}selected{% endif %}>
{{ c.name }}
</option>
{% endfor %}
</select>
</div>

<div class="input-group">
<label>Instructor</label>
<select name="instructor">
{% for i in instructors %}
<option value="{{ i.id }}" {% if i.id == webinar.instructor.id %}selected{% endif %}>
{{ i.name }}
</option>
{% endfor %}
</select>
</div>

<div class="input-group">
<label>Duration (minutes)</label>
<input type="number" name="duration" value="{{ webinar.duration_minutes }}">
</div>

</div>

<!-- 🔥 DESCRIPTION -->
<div class="editor-group full-width">
<label>Description</label>
<textarea name="description" class="ckeditor">
{{ webinar.description|default:"" }}
</textarea>
</div>

<!-- 🔥 RECORDING -->
<div class="recording-section">

<label>Zoom Recording</label>

<button type="button" class="btn-zoom" onclick="searchZoomRecordings()">
Search Recordings
</button>

<div id="zoomRecordingResults"></div>

<input type="hidden" name="selected_zoom_recording" id="selectedZoomRecording">

{% if webinar.zoom_recording_link %}
<div class="current-recording">
Current:
<a href="{{ webinar.zoom_recording_link }}" target="_blank">View Recording</a>
</div>
{% endif %}

</div>

<div class="form-actions">
<button type="submit" class="btn-publish">
Update Recorded Webinar
</button>
</div>

</form>

</div>
</div>

<script src="{% static 'home/js/webinar_create.js' %}"></script>

{% endblock %}
