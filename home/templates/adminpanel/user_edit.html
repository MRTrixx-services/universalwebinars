{% extends "adminpanel/base.html" %}
{% load static %}

{% block content %}

<style>
.user-edit-container {
    background: #f8f9fa;
    min-height: 100vh;
}

.breadcrumb {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
    font-size: 14px;
}

.breadcrumb a {
    color: #4f46e5;
    text-decoration: none;
    font-weight: 600;
}

.breadcrumb span {
    color: #94a3b8;
}

.edit-header {
    background: white;
    border-radius: 12px;
    padding: 28px 32px;
    margin-bottom: 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.edit-header h1 {
    font-size: 28px;
    font-weight: 700;
    color: #1e293b;
    margin: 0 0 8px 0;
}

.edit-header p {
    font-size: 14px;
    color: #64748b;
    margin: 0;
}

.form-card {
    background: white;
    border-radius: 12px;
    padding: 32px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.form-section {
    margin-bottom: 32px;
}

.form-section:last-child {
    margin-bottom: 0;
}

.section-title {
    font-size: 18px;
    font-weight: 700;
    color: #1e293b;
    margin: 0 0 20px 0;
    padding-bottom: 12px;
    border-bottom: 2px solid #e2e8f0;
    display: flex;
    align-items: center;
    gap: 10px;
}

.section-title i {
    color: #4f46e5;
}

.form-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
}

.form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.form-group.full-width {
    grid-column: 1 / -1;
}

.form-label {
    font-size: 13px;
    font-weight: 700;
    color: #475569;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.form-input {
    padding: 12px 16px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    font-size: 14px;
    color: #1e293b;
    transition: all 0.2s;
}

.form-input:focus {
    outline: none;
    border-color: #4f46e5;
    box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
}

.checkbox-group {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px;
    background: #f8fafc;
    border-radius: 8px;
    border: 2px solid #e2e8f0;
    transition: all 0.2s;
}

.checkbox-group:hover {
    background: #f1f5f9;
}

.checkbox-group input[type="checkbox"] {
    width: 20px;
    height: 20px;
    cursor: pointer;
    accent-color: #4f46e5;
}

.checkbox-group label {
    font-size: 14px;
    font-weight: 600;
    color: #475569;
    cursor: pointer;
    margin: 0;
}

.form-actions {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    padding-top: 24px;
    border-top: 2px solid #e2e8f0;
}

.btn {
    padding: 12px 24px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
    border: none;
    cursor: pointer;
}

.btn-primary {
    background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
    color: white;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3);
}

.btn-secondary {
    background: #f1f5f9;
    color: #475569;
    border: 2px solid #e2e8f0;
}

.btn-secondary:hover {
    background: #e2e8f0;
}

@media (max-width: 768px) {
    .form-grid {
        grid-template-columns: 1fr;
    }
}
</style>

<div class="user-edit-container">

<!-- BREADCRUMB -->
<div class="breadcrumb">
    <a href="{% url 'adminpanel:dashboard' %}"><i class="fas fa-home"></i> Dashboard</a>
    <span>/</span>
    <a href="{% url 'adminpanel:user_management' %}">User Management</a>
    <span>/</span>
    <a href="{% url 'adminpanel:user_detail' user_obj.id %}">{{ user_obj.first_name }} {{ user_obj.last_name }}</a>
    <span>/</span>
    <span>Edit</span>
</div>

<!-- HEADER -->
<div class="edit-header">
    <h1><i class="fas fa-user-edit"></i> Edit User</h1>
    <p>Update user information and settings</p>
</div>

<!-- FORM -->
<div class="form-card">
    <form method="post">
        {% csrf_token %}
        
        <!-- PERSONAL INFORMATION -->
        <div class="form-section">
            <h2 class="section-title">
                <i class="fas fa-user"></i> Personal Information
            </h2>
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">First Name</label>
                    <input type="text" name="first_name" value="{{ user_obj.first_name }}" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Last Name</label>
                    <input type="text" name="last_name" value="{{ user_obj.last_name }}" class="form-input" required>
                </div>
                <div class="form-group full-width">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" value="{{ user_obj.email }}" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Phone Number</label>
                    <input type="text" name="phone_number" value="{{ user_obj.phone_number }}" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">Company</label>
                    <input type="text" name="company" value="{{ user_obj.company }}" class="form-input">
                </div>
                <div class="form-group full-width">
                    <label class="form-label">Country</label>
                    <input type="text" name="country" value="{{ user_obj.country.code }}" class="form-input">
                </div>
            </div>
        </div>
        
        <!-- ACCOUNT STATUS -->
        <div class="form-section">
            <h2 class="section-title">
                <i class="fas fa-toggle-on"></i> Account Status
            </h2>
            <div class="form-grid">
                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" name="is_active" id="is_active" {% if user_obj.is_active %}checked{% endif %}>
                        <label for="is_active">Active Account</label>
                    </div>
                </div>
                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" name="is_verified" id="is_verified" {% if user_obj.is_verified %}checked{% endif %}>
                        <label for="is_verified">Verified User</label>
                    </div>
                </div>
                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" name="is_staff" id="is_staff" {% if user_obj.is_staff %}checked{% endif %}>
                        <label for="is_staff">Staff Access</label>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- FORM ACTIONS -->
        <div class="form-actions">
            <a href="{% url 'adminpanel:user_detail' user_obj.id %}" class="btn btn-secondary">
                <i class="fas fa-times"></i> Cancel
            </a>
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Save Changes
            </button>
        </div>
        
    </form>
</div>

</div>

{% endblock %}
