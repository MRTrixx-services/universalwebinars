services:

  db:
    image: postgres:17
    container_name: uw_postgres
    restart: always
    environment:
      POSTGRES_DB: webinar_db
      POSTGRES_USER: webinar_user
      POSTGRES_PASSWORD: StrongPassword123
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: uw_redis
    restart: always

  web:
    build: .
    container_name: uw_web
    restart: always
    command: gunicorn universalwebinars.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - .:/app
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
    env_file:
      - .env
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  celery:
    build: .
    container_name: uw_celery
    restart: always
    command: celery -A universalwebinars worker -l info
    env_file:
      - .env
    depends_on:
      - redis
      - db

  celery-beat:
    build: .
    container_name: uw_beat
    restart: always
    command: celery -A universalwebinars beat -l info
    env_file:
      - .env
    depends_on:
      - redis
      - db

volumes:
  postgres_data: